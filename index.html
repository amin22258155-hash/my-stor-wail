<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر جنة - Jannah Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', Arial, sans-serif; background: #f5f5f5; color: #333; }
        header { background: linear-gradient(135deg, #075e54, #128c7e); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .store-logo { max-height: 60px; max-width: 120px; object-fit: contain; background: white; padding: 5px; border-radius: 10px; }
        .store-name { font-size: 1.8rem; }
        .admin-btn { position: fixed; bottom: 20px; left: 20px; background: #1e1e2f; color: white; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        nav { background: white; padding: 10px; display: flex; justify-content: center; gap: 10px; overflow-x: auto; white-space: nowrap; border-bottom: 2px solid #eee; position: sticky; top: 100px; z-index: 99; }
        nav a { text-decoration: none; color: #666; padding: 8px 15px; border-radius: 20px; font-weight: bold; transition: 0.3s; }
        nav a.active { background: #128c7e; color: white; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .category-section { margin-bottom: 40px; }
        .category-title { font-size: 1.5rem; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #128c7e; display: inline-block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; position: relative; }
        .product-card:hover { transform: translateY(-5px); }
        .image-slider { position: relative; width: 100%; height: 300px; background: #eee; }
        .image-slider img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .image-slider img.active { display: block; }
        .slider-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .dot.active { background: white; width: 12px; border-radius: 10px; }
        .product-info { padding: 15px; }
        .product-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .product-price { color: #128c7e; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }
        .order-btn { display: block; width: 100%; background: #25d366; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }
        .order-btn:hover { background: #128c7e; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 600px; margin: 20px auto; padding: 25px; border-radius: 15px; position: relative; }
        .close-modal { position: absolute; left: 20px; top: 20px; font-size: 1.5rem; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; font-family: inherit; }
        .save-btn { background: #128c7e; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        .image-input-group { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .image-preview-item { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .status-badge { position: absolute; top: 10px; right: 10px; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; z-index: 10; }
        .status-published { background: #25d366; color: white; }
        .status-draft { background: #ffc107; color: #000; }
        @media (max-width: 600px) { .products-grid { grid-template-columns: 1fr; } .store-name { font-size: 1.4rem; } }
    </style>
</head>
<body>

<header id="storeHeader">
    <div class="logo-container">
        <img id="storeLogo" src="" alt="لوجو المتجر" class="store-logo" style="display:none">
        <h1 id="storeNameDisplay" class="store-name">متجر جنة</h1>
    </div>
    <p id="storeSloganDisplay"></p>
</header>

<nav id="navLinks">
    <a href="#" data-cat="all" class="active">الكل</a>
    <a href="#" data-cat="women">نسائي</a>
    <a href="#" data-cat="men">رجالي</a>
    <a href="#" data-cat="summer">صيفي</a>
    <a href="#" data-cat="health">صحة</a>
    <a href="#" data-cat="electronics">إلكترونيات</a>
</nav>

<div class="container" id="categoriesContainer"></div>

<button class="admin-btn" onclick="openAdminModal()">⚙️ لوحة التحكم</button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAdminModal()">✖</span>
        <h2>لوحة التحكم</h2>
        <div class="form-group">
            <label>الإجراء:</label>
            <select id="adminAction" onchange="updateAdminFields()">
                <option value="add">إضافة منتج جديد</option>
                <option value="edit">تعديل / حذف منتج</option>
                <option value="settings">إعدادات المتجر</option>
            </select>
        </div>
        <div id="adminDynamicFields"></div>
        <div id="editList" style="display:none; margin-top:20px; max-height:400px; overflow-y:auto; border:1px solid #eee; padding:10px;"></div>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('jannah_products')) || [];
    let storeSettings = JSON.parse(localStorage.getItem('jannah_settings')) || {
        name: "متجر جنة",
        slogan: "أفضل المنتجات بأفضل الأسعار",
        phone: "213663700122",
        primaryColor: "#128c7e",
        logo: ""
    };

    function saveAllData() {
        localStorage.setItem('jannah_products', JSON.stringify(products));
        localStorage.setItem('jannah_settings', JSON.stringify(storeSettings));
    }

    function applyStoreSettings() {
        document.getElementById('storeNameDisplay').innerText = storeSettings.name;
        document.getElementById('storeSloganDisplay').innerText = storeSettings.slogan;
        document.querySelector('header').style.background = `linear-gradient(135deg, ${storeSettings.primaryColor}, #075e54)`;
        if(storeSettings.logo) {
            document.getElementById('storeLogo').src = storeSettings.logo;
            document.getElementById('storeLogo').style.display = 'block';
        }
        renderProducts();
    }

    function renderProducts() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '';
        const cats = { women: "نسائي", men: "رجالي", summer: "صيفي", health: "صحة", electronics: "إلكترونيات" };
        
        Object.keys(cats).forEach(catKey => {
            const catProducts = products.filter(p => p.category === catKey && p.published);
            if(catProducts.length > 0) {
                let section = document.createElement('div');
                section.className = 'category-section';
                section.id = catKey;
                section.innerHTML = `<h2 class="category-title">${cats[catKey]}</h2>`;
                let grid = document.createElement('div');
                grid.className = 'products-grid';
                catProducts.forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="image-slider" id="slider-${p.id}">
                                ${p.images.map((img, i) => `<img src="${img}" class="${i===0?'active':''}" onclick="nextImage(${p.id})">`).join('')}
                                <div class="slider-dots">${p.images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>
                            </div>
                            <div class="product-info">
                                <div class="product-name">${p.name}</div>
                                <div class="product-price">${p.price} دج</div>
                                <button class="order-btn" onclick="sendOrder('${p.name}', '${p.price}')">اطلب عبر واتساب</button>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
                container.appendChild(section);
            }
        });
    }

    function nextImage(id) {
        const slider = document.getElementById(`slider-${id}`);
        const imgs = slider.querySelectorAll('img');
        const dots = slider.querySelectorAll('.dot');
        let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
        imgs[activeIdx].classList.remove('active');
        dots[activeIdx].classList.remove('active');
        activeIdx = (activeIdx + 1) % imgs.length;
        imgs[activeIdx].classList.add('active');
        dots[activeIdx].classList.add('active');
    }

    function sendOrder(name, price) {
        const msg = encodeURIComponent(`مرحباً، أود طلب منتج: ${name}\nالسعر: ${price} دج`);
        window.open(`https://wa.me/${storeSettings.phone}?text=${msg}`);
    }

    function openAdminModal() { document.getElementById('adminModal').style.display = 'block'; updateAdminFields(); }
    function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

    function handleImageUpload(input) {
        let container = document.getElementById("imagesContainer");
        if (!input.files) return;
        Array.from(input.files).forEach(file => {
            let reader = new FileReader();
            reader.onload = function(e) {
                let div = document.createElement("div");
                div.className = "image-input-group";
                div.innerHTML = `
                    <img src="${e.target.result}" class="image-preview-item">
                    <input type="hidden" value="${e.target.result}" class="image-url-data">
                    <span style="flex:1; font-size:12px; overflow:hidden">${file.name}</span>
                    <button type="button" onclick="this.parentElement.remove()" style="background:#e74c3c; color:white; border:none; border-radius:5px; padding:5px 10px;">✖</button>
                `;
                container.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }

    function updateAdminFields() {
        const action = document.getElementById('adminAction').value;
        const div = document.getElementById('adminDynamicFields');
        const editList = document.getElementById('editList');
        div.innerHTML = ''; editList.style.display = 'none';

        if(action === 'add') {
            div.innerHTML = `
                <select id="addCategory"><option value="women">نسائي</option><option value="men">رجالي</option><option value="summer">صيفي</option><option value="health">صحة</option><option value="electronics">إلكترونيات</option></select>
                <input type="text" id="addName" placeholder="اسم المنتج">
                <input type="number" id="addPrice" placeholder="السعر (بالدينار)">
                <div id="imagesContainer" style="margin-top:10px;"></div>
                <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleImageUpload(this)">
                <button type="button" class="save-btn" style="background:#25d366" onclick="document.getElementById('fileInput').click()">🖼️ اختر الصور من الاستوديو</button>
                <div style="margin:10px 0"><label><input type="checkbox" id="publishNow" checked> نشر المنتج فوراً</label></div>
                <button class="save-btn" onclick="executeAdd()">حفظ المنتج</button>`;
        } else if(action === 'edit') {
            editList.style.display = 'block';
            editList.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${p.name} (${p.price} دج)</span>
                    <div>
                        <button onclick="togglePublish(${p.id})">${p.published?'إخفاء':'نشر'}</button>
                        <button style="color:red" onclick="deleteProduct(${p.id})">حذف</button>
                    </div>
                </div>`).join('');
        } else if(action === 'settings') {
            div.innerHTML = `
                <input type="text" id="setName" value="${storeSettings.name}" placeholder="اسم المتجر">
                <input type="text" id="setSlogan" value="${storeSettings.slogan}" placeholder="شعار المتجر">
                <input type="text" id="setPhone" value="${storeSettings.phone}" placeholder="رقم الواتساب">
                <input type="color" id="setColor" value="${storeSettings.primaryColor}" style="height:50px">
                <label>لوجو المتجر:</label>
                <input type="file" accept="image/*" onchange="updateLogo(this)">
                <button class="save-btn" onclick="saveSettings()">حفظ الإعدادات</button>`;
        }
    }

    function executeAdd() {
        const name = document.getElementById('addName').value;
        const price = document.getElementById('addPrice').value;
        const cat = document.getElementById('addCategory').value;
        const pub = document.getElementById('publishNow').checked;
        const imgs = Array.from(document.querySelectorAll('.image-url-data')).map(i => i.value);
        
        if(!name || !price || imgs.length === 0) return alert("أكمل البيانات واختر صورة واحدة على الأقل");
        
        products.push({ id: Date.now(), name, price, category: cat, images: imgs, published: pub });
        saveAllData(); renderProducts(); closeAdminModal(); alert("تمت إضافة المنتج بنجاح");
    }

    function togglePublish(id) {
        let p = products.find(x => x.id === id);
        p.published = !p.published; saveAllData(); updateAdminFields(); renderProducts();
    }

    function deleteProduct(id) {
        if(confirm("هل أنت متأكد من الحذف؟")) {
            products = products.filter(x => x.id !== id);
            saveAllData(); updateAdminFields(); renderProducts();
        }
    }

    function updateLogo(input) {
        if(input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = function(e) { storeSettings.logo = e.target.result; };
            r.readAsDataURL(input.files[0]);
        }
    }

    function saveSettings() {
        storeSettings.name = document.getElementById('setName').value;
        storeSettings.slogan = document.getElementById('setSlogan').value;
        storeSettings.phone = document.getElementById('setPhone').value;
        storeSettings.primaryColor = document.getElementById('setColor').value;
        saveAllData(); applyStoreSettings(); closeAdminModal();
    }

    // تهيئة المتجر عند التحميل
    window.onload = applyStoreSettings;
</script>
</body>
</html>
