<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tabTitle">متجر جنة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; color: #333; }
        header { background: linear-gradient(135deg, #075e54, #128c7e); color: white; padding: 25px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo-img { max-height: 70px; margin-bottom: 10px; border-radius: 8px; display: none; }
        nav { background: white; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; white-space: nowrap; position: sticky; top: 120px; z-index: 99; }
        nav a { display: inline-block; margin: 0 10px; text-decoration: none; color: #075e54; font-weight: bold; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; min-height: 70vh; }
        .category-title { background: white; padding: 15px; border-right: 6px solid #128c7e; margin: 30px 0 20px; border-radius: 8px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer; text-align: center; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-desc { font-size: 0.9rem; color: #666; margin: 10px 0; line-height: 1.4; }
        .price { color: #e67e22; font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
        .btn-order { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; margin-top: auto; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 600px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .admin-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; }
        .tab-btn.active { background: #128c7e; color: white; }
        .floating-admin { position: fixed; bottom: 20px; left: 20px; background: #1e1e2f; color: white; border: none; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .save-btn { background: #128c7e; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .close-btn { background: #f44336; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .file-label { display: block; padding: 12px; background: #f8f9fa; border: 2px dashed #ddd; border-radius: 10px; text-align: center; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <img id="viewLogo" class="logo-img" src="">
    <h1 id="viewStoreName">متجر جنة</h1>
    <p id="viewSlogan">التوصيل متوفر لـ 58 ولاية</p>
</header>

<nav>
    <a onclick="renderHome()">🏠 الرئيسية</a>
    <a onclick="renderShipping()">🚚 أسعار التوصيل</a>
</nav>

<div class="container" id="appContent"></div>

<button class="floating-admin" onclick="openAdmin()">⚙️ لوحة التحكم</button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center">🛠️ إدارة المتجر</h2>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('tab1')">الهوية</button>
            <button class="tab-btn" onclick="switchTab('tab2')">المنتجات</button>
            <button class="tab-btn" onclick="switchTab('tab3')">التوصيل</button>
            <button class="tab-btn" onclick="switchTab('tab4')">الواتساب</button>
        </div>

        <div id="tab1" class="tab-content">
            <h4>تعديل الهوية</h4>
            <input type="text" id="setStoreName" placeholder="اسم المتجر">
            <input type="text" id="setSlogan" placeholder="وصف المتجر">
            <input type="text" id="setLogoUrl" placeholder="رابط اللوغو (اختياري)">
            <button class="save-btn" onclick="updateIdentity()">حفظ</button>
        </div>

        <div id="tab2" class="tab-content" style="display:none">
            <h4>إضافة منتج جديد</h4>
            <select id="prodCat">
                <option value="women">نسائي</option>
                <option value="men">رجالي</option>
                <option value="electronics">إلكترونيات</option>
            </select>
            <input type="text" id="prodName" placeholder="اسم المنتج">
            <textarea id="prodDesc" placeholder="وصف المنتج (مميزات، مقاسات، إلخ...)" rows="3"></textarea>
            <input type="text" id="prodPrice" placeholder="السعر (دج)">
            
            <label class="file-label">
                📸 اختر صورة من الهاتف
                <input type="file" id="prodImgFile" accept="image/*" style="display:none" onchange="previewImg(this)">
            </label>
            <div id="imgPreviewArea" style="text-align:center; margin-bottom:10px;"></div>

            <button class="save-btn" onclick="addNewProduct()">إضافة المنتج</button>
        </div>

        <div id="tab3" class="tab-content" style="display:none">
            <h4>التوصيل</h4>
            <input type="text" id="newStateName" placeholder="اسم الولاية">
            <input type="text" id="newHomePrice" placeholder="سعر المنزل">
            <input type="text" id="newOfficePrice" placeholder="سعر المكتب">
            <button class="save-btn" onclick="addNewState()">إضافة ولاية</button>
        </div>

        <div id="tab4" class="tab-content" style="display:none">
            <h4>الواتساب</h4>
            <textarea id="setWA" placeholder="رقم الهاتف الدولي (213...)" rows="2"></textarea>
            <button class="save-btn" onclick="updateWA()">حفظ</button>
        </div>

        <button class="close-btn" onclick="closeAdmin()">إغلاق</button>
    </div>
</div>

<script>
    let storeData = JSON.parse(localStorage.getItem("jannah_config")) || { name: "متجر جنة", slogan: "التوصيل متوفر لـ 58 ولاية", logo: "", waNumbers: ["213663700122"] };
    let products = JSON.parse(localStorage.getItem("jannah_prods")) || { women: [], men: [], electronics: [] };
    let states = JSON.parse(localStorage.getItem("jannah_states")) || [{ name: "باتنة", home: "500", office: "300" }];
    let currentBase64Img = "";

    function init() {
        document.getElementById("viewStoreName").innerText = storeData.name;
        document.getElementById("viewSlogan").innerText = storeData.slogan;
        if(storeData.logo) { document.getElementById("viewLogo").src = storeData.logo; document.getElementById("viewLogo").style.display = "inline-block"; }
        renderHome();
    }

    function previewImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                currentBase64Img = e.target.result;
                document.getElementById("imgPreviewArea").innerHTML = `<img src="${currentBase64Img}" style="width:100px; border-radius:10px;">`;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addNewProduct() {
        const cat = document.getElementById("prodCat").value;
        const name = document.getElementById("prodName").value;
        const desc = document.getElementById("prodDesc").value;
        const price = document.getElementById("prodPrice").value;

        if(!name || !price || !currentBase64Img) return alert("يرجى إكمال البيانات واختيار صورة");

        products[cat].push({ name, desc, price, image: currentBase64Img });
        localStorage.setItem("jannah_prods", JSON.stringify(products));
        alert("✅ تمت إضافة المنتج بنجاح");
        
        // مسح الحقول بعد الإضافة
        document.getElementById("prodName").value = "";
        document.getElementById("prodDesc").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("imgPreviewArea").innerHTML = "";
        currentBase64Img = "";
        
        renderHome();
    }

    function renderHome() {
        const app = document.getElementById("appContent");
        app.innerHTML = "";
        for(let cat in products) {
            if(products[cat].length > 0) {
                let html = `<div class="category-title"><h2>${cat === 'women' ? '👗 نسائي' : cat === 'men' ? '👔 رجالي' : '📱 إلكترونيات'}</h2></div><div class="products-grid">`;
                products[cat].forEach(p => {
                    html += `
                    <div class="card" onclick="sendOrder('${p.name}', '${p.price}')">
                        <img src="${p.image}">
                        <div class="card-body">
                            <h3>${p.name}</h3>
                            <p class="product-desc">${p.desc || 'لا يوجد وصف متاح'}</p>
                            <div class="price">${p.price} دج</div>
                            <button class="btn-order">اطلب الآن</button>
                        </div>
                    </div>`;
                });
                app.innerHTML += html + "</div>";
            }
        }
    }

    function sendOrder(name, price) {
        const msg = `مرحباً متجر ${storeData.name}%0Aأود طلب: ${name}%0Aالسعر: ${price} دج`;
        window.open(`https://wa.me/${storeData.waNumbers[0]}?text=${msg}`, "_blank");
    }

    function openAdmin() { if(prompt("كلمة المرور:") === "admin123") document.getElementById("adminModal").style.display = "flex"; }
    function closeAdmin() { document.getElementById("adminModal").style.display = "none"; }
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }
    
    // دوال المساعدة للهوية والواتساب والولايات (كما في الكود السابق)
    function updateIdentity() { storeData.name = document.getElementById("setStoreName").value || storeData.name; localStorage.setItem("jannah_config", JSON.stringify(storeData)); location.reload(); }
    function updateWA() { storeData.waNumbers = [document.getElementById("setWA").value]; localStorage.setItem("jannah_config", JSON.stringify(storeData)); alert("✅ تم الحفظ"); }
    function addNewState() { states.push({ name: document.getElementById("newStateName").value, home: document.getElementById("newHomePrice").value, office: document.getElementById("newOfficePrice").value }); localStorage.setItem("jannah_states", JSON.stringify(states)); alert("✅ تمت الإضافة"); }
    function renderShipping() {
        let table = `<div style="background:white; padding:20px; border-radius:15px;"><h2>🚚 أسعار التوصيل</h2><table><thead><tr><th>الولاية</th><th>للمنزل</th><th>للمكتب</th></tr></thead><tbody>`;
        states.forEach(s => table += `<tr><td>${s.name}</td><td>${s.home} دج</td><td>${s.office} دج</td></tr>`);
        document.getElementById("appContent").innerHTML = table + "</tbody></table></div>";
    }

    init();
</script>
</body>
</html>
